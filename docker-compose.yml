services:
  blog-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: blog-app:latest
    container_name: blog-app
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_PATH: /data/blog.db
    volumes:
      - blog-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  blog-data:
